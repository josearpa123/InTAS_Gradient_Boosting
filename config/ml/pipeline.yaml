# Pipeline configuration — InTAS PRODUCCION READY ligero
# All paths are resolved from repository root.

paths:
  omnet_sca_dir: data/omnet_results
  omnet_injected_sca_dir: data/omnet_results_injected
  kpi_csv_dir: data/kpi
  kpi_summary_csv: data/kpi/summary_kpis_avg.csv
  kpi_wide_csv: data/kpi/summary_kpis_wide.csv

  mobility_input_dir: data/silver/fcd_cells
  mobility_output: data/mobility_metrics.parquet

  unified_output: data/unified_metrics.parquet
  validation_report: reports/final/metrics_validation.txt

  gold_dataset: data/dataset_windows.parquet
  ml_table: data/ml_table.parquet
  model_cbm: data/models/catboost_gbdt.cbm
  model_xgb: data/models/xgboost_ref.json
  calibrator_isotonic: data/models/isotonic.joblib
  xgb_encoders: data/models/xgb_encoders.joblib

  rho_analytic_input: data/theory/analytic_rho_reference.parquet
  rho_raw_output: data/artifacts/ml/final/rho_hat_windows_raw.parquet
  rho_cal_output: data/artifacts/ml/final/rho_hat_windows_calibrated.parquet

  injection_plan: data/artifacts/ml/injection/injection_plan.json
  injection_csv: data/artifacts/ml/injection/injection_plan.csv

  rho_compare_report: reports/final/rho_compare_recomputed_report.txt
  rho_compare_global_csv: reports/final/rho_compare_recomputed_global.csv
  rho_compare_by_period_csv: reports/final/rho_compare_recomputed_by_period.csv
  rho_compare_agg_csv: reports/final/rho_recomputed_agg_period_veh.csv

  prob_validity_global_csv: reports/final/probabilistic_validity_global.csv
  prob_validity_bins_csv: reports/final/probabilistic_validity_bins.csv
  prob_validity_report: reports/final/probabilistic_validity_report.txt
  prob_validity_curve_png: reports/final/probabilistic_calibration_curve.png

  mmtqhu_validation_csv: reports/final/mmtqhu_validation_by_profile.csv
  mmtqhu_validation_report: reports/final/mmtqhu_validation_report.txt

  ml_report: reports/ml/report_catboost_isotonic.json
  feature_importance_csv: reports/ml/feature_importance.csv
  ablation_csv: reports/ml/ablation_auc.csv

  thesis_figures_dir: reports/final/thesis_figures
  figures_manifest: reports/final/thesis_figures/figures_manifest.md

  sumo_traces_omnet_dir: data/sumo_traces_omnet

pipeline:
  skip_completed: true
  fail_fast: true

quality:
  nan_threshold: 0.01
  critical_columns:
    - mean_speed
    - max_speed
    - total_distance_m
    - lane_changes
    - duration_in_cell_s
