# Phase 4 - Master pipeline configuration

paths:
  # Paths are resolved from repository root (InTAS-master)
  omnet_sca_dir: omnet/intas_simu5g
  kpi_csv_dir: export/kpi_csv
  kpi_summary_csv: export/summary_kpis_avg.csv
  kpi_wide_csv: export/summary_kpis_wide.csv

  mobility_input_dir: InTAS_Celdas_v3/datasets/silver/fcd_cells
  mobility_output: InTAS_Celdas_v3/datasets/mobility_metrics.parquet

  unified_output: InTAS_Celdas_v3/datasets/unified_metrics.parquet
  validation_report: InTAS_Celdas_v3/reports/metrics_validation.txt

  gold_dataset: InTAS_Celdas_v3/datasets/gold/dataset_windows.parquet
  model_cbm: InTAS_Celdas_v3/models/catboost_gbdt.cbm
  calibrator_isotonic: InTAS_Celdas_v3/models/isotonic.joblib

  rho_analytic_input: InTAS_Celdas_v3/datasets/silver/analytic_rho/_ALL_PERIODS.parquet
  rho_raw_output: InTAS_Celdas_v3/artifacts/ml/final/rho_hat_windows_raw.parquet
  rho_raw_sample_csv: InTAS_Celdas_v3/reports/final/rho_hat_raw_sample.csv
  rho_raw_inventory: InTAS_Celdas_v3/reports/final/rho_hat_raw_inventory.json

  rho_cal_output: InTAS_Celdas_v3/artifacts/ml/final/rho_hat_windows_calibrated.parquet
  rho_cal_sample_csv: InTAS_Celdas_v3/reports/final/rho_hat_calibrated_sample.csv
  rho_cal_inventory: InTAS_Celdas_v3/reports/final/rho_hat_calibrated_inventory.json

  rho_compare_report: InTAS_Celdas_v3/reports/final/rho_compare_recomputed_report.txt
  rho_compare_global_csv: InTAS_Celdas_v3/reports/final/rho_compare_recomputed_global.csv
  rho_compare_by_period_csv: InTAS_Celdas_v3/reports/final/rho_compare_recomputed_by_period.csv
  rho_compare_agg_csv: InTAS_Celdas_v3/reports/final/rho_recomputed_agg_period_veh.csv

  prob_validity_global_csv: InTAS_Celdas_v3/reports/final/probabilistic_validity_global.csv
  prob_validity_bins_csv: InTAS_Celdas_v3/reports/final/probabilistic_validity_bins.csv
  prob_validity_report: InTAS_Celdas_v3/reports/final/probabilistic_validity_report.txt
  prob_validity_curve_png: InTAS_Celdas_v3/reports/final/probabilistic_calibration_curve.png

  cpss_actions_summary_json: InTAS_Celdas_v3/reports/final/cpss_actions/cpss_actions_summary.json
  cpss_actions_report_md: InTAS_Celdas_v3/reports/final/cpss_actions/cpss_actions_report.md
  cpss_model_family_csv: InTAS_Celdas_v3/reports/final/cpss_actions/model_family_comparison.csv
  cpss_ablation_csv: InTAS_Celdas_v3/reports/final/cpss_actions/ablation_real_with_bootstrap.csv
  cpss_temporal_csv: InTAS_Celdas_v3/reports/final/cpss_actions/temporal_holdout_hc3.csv

  phase3_notebooks:
    - InTAS_Celdas_v3/reports/01_scenario_comparison.ipynb
    - InTAS_Celdas_v3/reports/02_policy_impact.ipynb
    - InTAS_Celdas_v3/reports/03_5g_coverage_analysis.ipynb
    - InTAS_Celdas_v3/reports/04_ml_model_insights.ipynb

pipeline:
  skip_completed: true
  fail_fast: true
  run_phase3_notebooks: false
  notebook_timeout_sec: 1200

quality:
  nan_threshold: 0.01
  critical_columns:
    - mean_speed
    - max_speed
    - total_distance_m
    - lane_changes
    - duration_in_cell_s
